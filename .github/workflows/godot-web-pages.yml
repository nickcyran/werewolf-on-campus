name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot and export templates
        run: |
          GODOT_VERSION="4.6.1"
          GODOT_STATUS="stable"
          GODOT_BIN="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64"
          TEMPLATE_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          BASE_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}"

          sudo apt-get update
          sudo apt-get install -y wget unzip

          wget -q "${BASE_URL}/${GODOT_BIN}.zip"
          unzip -q "${GODOT_BIN}.zip"
          chmod +x "${GODOT_BIN}"

          mkdir -p "${TEMPLATE_DIR}"
          wget -q "${BASE_URL}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz" -d ./godot-templates
          cp -r ./godot-templates/templates/* "${TEMPLATE_DIR}/"

          test -f "${TEMPLATE_DIR}/web_release.zip"

          mkdir -p build/web
          ./${GODOT_BIN} --headless --path . --import
          ./${GODOT_BIN} --headless --path . --export-release "Web" "build/web/index.html"
          touch build/web/.nojekyll

      - name: Show export output
        run: find ./build/web -type f | sort

      # GitHub Pages doesn't allow custom response headers, so we inject a
      # service worker (coi-serviceworker) that sets the Cross-Origin-Isolation
      # headers Godot's web export requires for SharedArrayBuffer.
      - name: Inject coi-serviceworker
        run: |
          curl -sL https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js \
            -o "build/web/coi-serviceworker.js"
          sed -i 's|<head>|<head>\n\t<script src="coi-serviceworker.js"></script>|' "build/web/index.html"

      # 404.html redirect keeps deep-links working on gh-pages.
      - name: Add 404 redirect
        run: |
          echo '<html><head><meta http-equiv="refresh" content="0;url=index.html"></head></html>' \
            > "build/web/404.html"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true
